<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Service Unavailable — d3ftly</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
    .container{text-align:center;max-width:480px}
    .code{font-size:8rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#ef4444,#dc2626);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    h1{font-size:1.5rem;margin:1rem 0 .5rem;color:#f0f0f5}
    p{color:#9090a0;line-height:1.6;margin-bottom:2rem}
    a{display:inline-block;padding:.75rem 2rem;background:#6366f1;color:#fff;text-decoration:none;border-radius:.5rem;font-weight:600;transition:background .2s}
    a:hover{background:#4f46e5}
  </style>
</head>
<body>
  <div class="container">
    <div class="code">502</div>
    <h1>Service temporarily unavailable</h1>
    <p>d3ftly is undergoing maintenance or experiencing high load. Please try again shortly.</p>
    <a href="/dashboard">Back to Dashboard</a>
  </div>
</body>
</html>
