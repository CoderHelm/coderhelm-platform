name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Rust (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      # Cache ~/.cargo/registry + services/target in one hit for both crates
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services
          cache-on-failure: true
      - uses: mlugg/setup-zig@v2
      - name: Install cargo-zigbuild
        run: pip3 install cargo-zigbuild
      # Build both gateway + worker in one invocation — shared deps compiled once
      - name: Build workspace
        working-directory: services
        run: cargo zigbuild --workspace --release --target aarch64-unknown-linux-musl
      - name: Package artifacts
        run: |
          cp services/target/aarch64-unknown-linux-musl/release/gateway bootstrap
          zip gateway.zip bootstrap
          rm bootstrap
          cp services/target/aarch64-unknown-linux-musl/release/worker bootstrap
          zip worker.zip bootstrap
      - uses: actions/upload-artifact@v4
        with:
          name: gateway
          path: gateway.zip
      - uses: actions/upload-artifact@v4
        with:
          name: worker
          path: worker.zip

  deploy:
    name: CDK Deploy
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            infra/package-lock.json

      - uses: actions/download-artifact@v4
        with:
          name: gateway
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: worker
          path: artifacts/

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::REDACTED_AWS_ACCOUNT_ID:role/d3ftly-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Cleanup legacy app frontend stack (one-time)
        run: |
          if aws cloudformation describe-stacks --stack-name d3ftly-prod-app >/dev/null 2>&1; then
            echo "Deleting legacy stack d3ftly-prod-app to release app.d3ftly.com alias"
            aws cloudformation delete-stack --stack-name d3ftly-prod-app
            aws cloudformation wait stack-delete-complete --stack-name d3ftly-prod-app
          else
            echo "Legacy stack d3ftly-prod-app not found; skipping cleanup"
          fi

      - name: Stripe setup (idempotent)
        run: bash scripts/setup-stripe.sh

      - working-directory: infra
        run: npm ci
      - working-directory: infra
        run: npx cdk deploy --all --require-approval never
        env:
          GATEWAY_ZIP: ${{ github.workspace }}/artifacts/gateway.zip
          WORKER_ZIP: ${{ github.workspace }}/artifacts/worker.zip
          CDK_DEFAULT_ACCOUNT: "REDACTED_AWS_ACCOUNT_ID"
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
