name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  gateway:
    name: Gateway (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/gateway
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  worker:
    name: Worker (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/worker
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  infra:
    name: CDK Synth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - name: Create placeholder assets for synth
        run: |
          mkdir -p ../services/gateway/target/lambda/gateway
          mkdir -p ../services/worker/target/lambda/worker
          touch ../services/gateway/target/lambda/gateway/bootstrap
          touch ../services/worker/target/lambda/worker/bootstrap
      - run: npx cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: "654654210434"
          CDK_DEFAULT_REGION: us-east-1
