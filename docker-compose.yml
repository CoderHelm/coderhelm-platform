services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb,sqs,s3,ses,secretsmanager,bedrock
      DEFAULT_REGION: us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ./services
      dockerfile: gateway/Dockerfile
    image: coderhelm-gateway:local
    ports:
      - "8080:8080"
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      STAGE: local
      SECRETS_NAME: coderhelm/local/secrets
      TABLE_NAME: coderhelm-local-main
      RUNS_TABLE_NAME: coderhelm-local-runs
      ANALYTICS_TABLE_NAME: coderhelm-local-analytics
      EVENTS_TABLE_NAME: coderhelm-local-events
      USERS_TABLE_NAME: coderhelm-local-users
      JIRA_TOKENS_TABLE_NAME: coderhelm-local-jira-tokens
      JIRA_EVENTS_TABLE_NAME: coderhelm-local-jira-events
      PLANS_TABLE_NAME: coderhelm-local-plans
      JIRA_CONFIG_TABLE_NAME: coderhelm-local-jira-config
      REPOS_TABLE_NAME: coderhelm-local-repos
      SETTINGS_TABLE_NAME: coderhelm-local-settings
      INFRA_TABLE_NAME: coderhelm-local-infra
      BILLING_TABLE_NAME: coderhelm-local-billing
      BANNERS_TABLE_NAME: coderhelm-local-banners
      BUCKET_NAME: coderhelm-local-bucket
      INVOICE_BUCKET_NAME: coderhelm-local-invoices
      TICKET_QUEUE_URL: http://localstack:4566/000000000000/coderhelm-local-tickets
      CI_FIX_QUEUE_URL: http://localstack:4566/000000000000/coderhelm-local-ci-fix
      FEEDBACK_QUEUE_URL: http://localstack:4566/000000000000/coderhelm-local-feedback
      DLQ_URL: http://localstack:4566/000000000000/coderhelm-local-dlq
      SES_FROM_ADDRESS: notifications@coderhelm.com
      SES_TEMPLATE_PREFIX: coderhelm-local
      MODEL_ID: us.anthropic.claude-sonnet-4-6
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - coderhelm

  worker:
    build:
      context: ./services
      dockerfile: worker/Dockerfile
    image: coderhelm-worker:local
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      STAGE: local
      SECRETS_NAME: coderhelm/local/secrets
      TABLE_NAME: coderhelm-local-main
      RUNS_TABLE_NAME: coderhelm-local-runs
      ANALYTICS_TABLE_NAME: coderhelm-local-analytics
      USERS_TABLE_NAME: coderhelm-local-users
      PLANS_TABLE_NAME: coderhelm-local-plans
      JIRA_CONFIG_TABLE_NAME: coderhelm-local-jira-config
      REPOS_TABLE_NAME: coderhelm-local-repos
      SETTINGS_TABLE_NAME: coderhelm-local-settings
      INFRA_TABLE_NAME: coderhelm-local-infra
      BILLING_TABLE_NAME: coderhelm-local-billing
      BUCKET_NAME: coderhelm-local-bucket
      MODEL_ID: us.anthropic.claude-sonnet-4-6
      LIGHT_MODEL_ID: us.anthropic.claude-sonnet-4-6
      SES_FROM_ADDRESS: notifications@coderhelm.com
      SES_TEMPLATE_PREFIX: coderhelm-local
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - coderhelm

networks:
  coderhelm:
    driver: bridge

volumes:
  localstack_data:
