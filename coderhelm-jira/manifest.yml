modules:
  trigger:
    - key: coderhelm-jira-trigger
      function: jiraHandler
      events:
        - avi:jira:created:issue
        - avi:jira:assigned:issue
        - avi:jira:updated:issue
        - avi:jira:commented:issue
  webtrigger:
    - key: list-projects-trigger
      function: listProjectsHandler
    - key: create-ticket-trigger
      function: createTicketHandler
    - key: add-comment-trigger
      function: addCommentHandler
    - key: get-site-url-trigger
      function: getSiteUrlHandler
  jira:adminPage:
    - key: coderhelm-admin-page
      resource: adminPage
      resolver:
        function: adminResolver
      title: Coderhelm Settings
  function:
    - key: jiraHandler
      handler: index.handler
    - key: adminResolver
      handler: admin.resolver
    - key: listProjectsHandler
      handler: index.listProjectsHandler
    - key: createTicketHandler
      handler: index.createTicketHandler
    - key: addCommentHandler
      handler: index.addCommentHandler
    - key: getSiteUrlHandler
      handler: index.getSiteUrlHandler
resources:
  - key: adminPage
    path: resources/admin/build
permissions:
  scopes:
    - read:jira-work
    - write:jira-work
    - storage:app
    - read:attachment:jira
  external:
    fetch:
      backend:
        - https://api.coderhelm.com
app:
  name: Coderhelm
  description: >
    AI coding agent that turns Jira tickets into pull requests. Assign an issue
    — Coderhelm creates a branch, implements the change, runs your CI, and opens
    a draft PR. Self-reviews every change before you see it.
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/de730821-2955-4d78-836e-55b6e7c23c88
