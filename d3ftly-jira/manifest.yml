modules:
  trigger:
    - key: d3ftly-jira-trigger
      function: jiraHandler
      events:
        - avi:jira:assigned:issue
        - avi:jira:updated:issue
  jira:adminPage:
    - key: d3ftly-admin-page
      resource: adminPage
      resolver:
        function: adminResolver
      title: d3ftly Settings
  function:
    - key: jiraHandler
      handler: index.handler
    - key: adminResolver
      handler: admin.resolver
resources:
  - key: adminPage
    path: resources/admin/build
permissions:
  scopes:
    - read:jira-work
    - storage:app
  external:
    fetch:
      backend:
        - https://api.d3ftly.com
app:
  name: d3ftly
  description: >
    AI coding agent that turns Jira tickets into pull requests.
    Assign an issue — d3ftly creates a branch, implements the change,
    runs your CI, and opens a draft PR. Self-reviews every change
    before you see it.
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/0f707126-f6c4-4cae-9332-d736617d4d53
